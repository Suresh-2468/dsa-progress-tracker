<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="stylesheet"
          href="dropdown.css">

</head>

<body>

    <div class="platform-dashboard">

        <div class="platform-content">

            <h1>Settings</h1>

            <div class="settings-card">

                <h3>Preferences</h3>

                <label>

                    <input type="checkbox"
                           id="darkMode">

                    Dark Mode

                </label>

                <br><br>

                <label>

                    <input type="checkbox"
                           id="showCompleted">

                    Show Completed Problems

                </label>

                <br><br>

                <label>

                    <input type="checkbox"
                           id="openNewTab">

                    Open Links In New Tab

                </label>

            </div>

            <br>

            <div class="settings-card">

                <h3>Danger Zone</h3>

                <button id="resetProgressBtn">

                    Reset All Progress

                </button>

            </div>

        </div>

    </div>

    <script src="settings.js"></script>

</body>

</html>
