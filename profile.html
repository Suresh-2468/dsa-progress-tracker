<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
          rel="stylesheet">

</head>

<body>

    <div class="profile-container">

        <a href="index.html" class="back-btn">

            <i class="ri-arrow-left-line"></i>

            Back To Dashboard

        </a>

        <!-- Profile Header -->

        <div class="profile-header">

            <div class="profile-avatar">

                <i class="ri-user-3-fill"></i>

            </div>

            <h1 id="profileName">Suresh</h1>

            <p>DSA Learner</p>

        </div>

        <!-- Stats -->

        <div class="profile-stats">

            <div class="profile-stat-card">

                <h3>Total Solved</h3>

                <p id="profileTotalSolved">0</p>

            </div>

            <div class="profile-stat-card">

                <h3>Easy</h3>

                <p id="profileEasySolved">0</p>

            </div>

            <div class="profile-stat-card">

                <h3>Medium</h3>

                <p id="profileMediumSolved">0</p>

            </div>

            <div class="profile-stat-card">

                <h3>Hard</h3>

                <p id="profileHardSolved">0</p>

            </div>

        </div>

        <!-- Coding Score -->

        <div class="profile-info-card">

            <h3>🏆 Coding Score</h3>

            <p id="codingScore">0</p>

        </div>

        <!-- Platform Statistics -->

        <div class="profile-info-card">

            <h3>💻 Platform Statistics</h3>

            <div class="platform-stats">

                <p>LeetCode : 95 Problems</p>

                <p>GeeksforGeeks : 42 Problems</p>

                <p>HackerRank : 0 Problems</p>

                <p>CodeChef : 19 Problems</p>

            </div>

        </div>

    </div>

</body>

</html>
